<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Estimate - Real Estate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #00d4ff;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .nav a {
            color: #fff;
            text-decoration: none;
            padding: 12px 30px;
            border: 2px solid #00d4ff;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        
        .nav a:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }
        
        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 50px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        .price-label {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 15px;
        }
        
        .price {
            font-size: 4rem;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        
        .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .detail-item {
            text-align: center;
        }
        
        .detail-value {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
        }
        
        .detail-label {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-top: 5px;
        }
        
        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }
        
        .btn {
            padding: 18px 40px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #1a1a2e;
            border: none;
        }
        
        .btn-secondary {
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        
        .confidence {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
        }
        
        .confidence-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            width: 85%;
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            border-radius: 4px;
        }
        
        .confidence-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #a0a0a0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Price Estimate</h1>
        </header>
        
        <nav class="nav">
            <a href="/">New Estimate</a>
            <a href="/seller">List Property</a>
        </nav>
        
        <div class="result-card">
            <p class="price-label">Estimated Market Value</p>
            <p class="price">${{ "{:,.0f}".format(predicted_price) }}</p>
            
            <div class="confidence">
                <div class="confidence-text">
                    <span>Confidence Level</span>
                    <span>85%</span>
                </div>
                <div class="confidence-bar">
                    <div class="confidence-fill"></div>
                </div>
            </div>
            
            <div class="details">
                <div class="detail-item">
                    <div class="detail-value">{{ bedrooms }}</div>
                    <div class="detail-label">Bedrooms</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value">{{ bathrooms }}</div>
                    <div class="detail-label">Bathrooms</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value">{{ "{:,}".format(sqft|int) }}</div>
                    <div class="detail-label">Sq. Ft.</div>
                </div>
            </div>
            
            <div class="actions">
                <a href="/seller" class="btn btn-primary">List This Property</a>
                <a href="/" class="btn btn-secondary">New Estimate</a>
            </div>
        </div>
    </div>
</body>
</html>
